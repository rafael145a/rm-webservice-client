name: Publish to npm

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # cria a tag git após publicação
      id-token: write   # emite OIDC token para o npm Trusted Publisher
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Atualiza npm (Trusted Publisher exige >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verifica se a versão já está publicada
        id: check
        shell: bash
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=Skip publish::$NAME@$VERSION já está publicado no npm"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: npm publish (Trusted Publisher / OIDC)
        if: steps.check.outputs.skip == 'false'
        run: npm publish --access public

      - name: Cria tag git
        if: steps.check.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = `v${{ steps.check.outputs.version }}`;
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/tags/${tag}`,
                sha: context.sha,
              });
              core.notice(`Tag ${tag} criada`);
            } catch (e) {
              if (e.status === 422) {
                core.notice(`Tag ${tag} já existe — skip`);
              } else {
                throw e;
              }
            }
